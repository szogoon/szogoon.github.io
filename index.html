<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Przemysław Małolepszy</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #0d1117;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: 'Courier New', Courier, monospace;
    }

    .terminal {
      width: 100%;
      max-width: 800px;
      border: 1px solid #30363d;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
    }

    .titlebar {
      background: #161b22;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid #30363d;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }
    .dot-red    { background: #ff5f56; }
    .dot-yellow { background: #ffbd2e; }
    .dot-green  { background: #27c93f; }

    .titlebar-label {
      color: #8b949e;
      font-size: 12px;
      margin-left: 8px;
    }

    .body {
      background: #0d1117;
      padding: 28px 32px;
      font-size: 15px;
      line-height: 1.7;
    }

    /* shared content styles */
    .comment  { color: #6e7681; }
    .prompt   { color: #3fb950; }
    .cmd      { color: #c9d1d9; }
    .divider  { border: none; border-top: 1px solid #21262d; margin: 16px 0; }
    .line     { margin: 10px 0; }

    /* whoami output */
    .name  { color: #58a6ff; font-size: 22px; font-weight: bold; display: block; margin: 2px 0; }
    .title { color: #8b949e; display: block; }
  </style>
</head>
<body>
  <div class="terminal">
    <div class="titlebar">
      <div class="dot dot-red"></div>
      <div class="dot dot-yellow"></div>
      <div class="dot dot-green"></div>
      <span class="titlebar-label">~  —  bash</span>
    </div>
    <div class="body">
      <div class="line"><span class="comment"># welcome to my corner of the internet</span></div>

      <div class="line">
        <span class="prompt">visitor@web</span><span class="cmd">:~$</span>&nbsp;<span class="cmd">whoami</span>
      </div>
      <span class="name">Przemysław Małolepszy</span>
      <span class="title">Full Stack Software Engineer</span>

      <hr class="divider">
      <!-- about goes here -->
    </div>
  </div>
</body>
</html>
